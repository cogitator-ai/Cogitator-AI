# cogitator.yml — Personal AI assistant configuration
# Generated by `cogitator wizard` or created manually.
# Start with `cogitator up`.

name: jarvis
personality: |
  You are Jarvis, a personal AI assistant for Alex.
  Be concise, friendly, and proactive. Use tools when they can help.
  Remember important things about Alex using memory tools.

llm:
  provider: google
  model: google/gemini-2.5-flash

# Messaging platform channels.
# Each requires tokens in .env (TG_TOKEN, DISCORD_TOKEN, SLACK_BOT_TOKEN, etc.)
channels:
  telegram:
    ownerIds: ["123456789"]

# Agent capabilities — each adds relevant tools to the agent.
capabilities:
  webSearch: true
  scheduler: true
  fileSystem:
    paths:
      - ~/Documents
      - ~/Projects

# Persistent memory with knowledge graph and auto-extraction.
memory:
  adapter: sqlite
  path: ~/.cogitator/memory.db
  autoExtract: true
  knowledgeGraph: true
  compaction:
    threshold: 50

# Streaming settings for progressive message updates.
stream:
  flushInterval: 600
  minChunkSize: 30
